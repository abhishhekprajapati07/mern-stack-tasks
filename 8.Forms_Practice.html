<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms_Practice</title>
  </head>
  <body>
    <h2>GoGreen :)</h2>

    <center>
      <form action="dumy.html">
        <label for="name">Name : </label>
        <input
          type="text"
          id="name"
          maxlength="50"
          required
          placeholder="Enter your Full name"
        />
        <br /><br />

        <label for="email">Email : </label>
        <input type="email" id="email" value="user@gmail.com" readonly />
        <br /><br />

        <label for="mobile">Phone Number :</label>
        <input
          type="tel"
          id="mobile"
          pattern="[0-9]{10}"
          required
          placeholder="10 digit Phone number"
        />
        <br /><br />

        <label for="password">Enter Password :</label>
        <input
          type="password"
          id="password"
          required
          pattern="((?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,20})"
          placeholder="Enter your password"
        />
        <br /><br />

        <label for="age">Enter Your Age : </label>
        <input
          type="number"
          id="age"
          required
          min="21"
          max="65"
          placeholder="Enter your age"
        />
        <br /><br />

        <label for="xyz">Enter Your Vehicle no : </label>
        <input
          type="text"
          id="xyz"
          placeholder="Enter your Vehicle No"
          pattern="[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}"
        />
        <br /><br />

        <label for="city">City : </label>
        <select id="city" required>
          <option value="">----Select City----</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Delhi">Delhi</option>
          <option value="Thane">Thane</option>
        </select>
        <br /><br />

        <label for="terms">Terms & Condition : </label>
        <input type="checkbox" id="terms" required /> <br /><br />

        <button type="submit">Submit</button>
      </form>
    </center>
  </body>
</html>
